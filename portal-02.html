<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL NOISE — Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;700&family=Courier+Prime:wght@400;700&display=swap');

  :root {
    --white:    #f4f1ea;
    --concrete: #e6e2d8;
    --ink:      #141210;
    --mid:      #7a756e;
    --burn:     #c23308;
    --card-bg:  #f9f7f2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background-color: var(--white);
    color: var(--ink);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    padding: 1rem 2rem;
    border-bottom: 1px solid rgba(20,18,16,0.2);
    display: flex; justify-content: space-between; align-items: center;
    background: var(--concrete);
  }
  .nav-back {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 400;
    font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--mid); text-decoration: none; transition: color 0.2s;
  }
  .nav-back:hover { color: var(--burn); }
  .nav-band {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem;
    color: var(--mid); letter-spacing: 0.05em;
  }
  .nav-band span { color: var(--burn); }

  /* ── HERO ── */
  .portal-hero {
    padding: 4rem 2rem 3rem;
    max-width: 860px; margin: 0 auto;
    border-bottom: 1px solid rgba(20,18,16,0.15);
  }
  .portal-meta {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 300;
    font-size: 0.65rem; letter-spacing: 0.5em; text-transform: uppercase;
    color: var(--burn); margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .portal-meta::after { content: ''; flex: 1; height: 1px; background: var(--ink); opacity: 0.15; }

  .portal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 7rem);
    line-height: 0.9; color: var(--ink);
    letter-spacing: 0.02em; margin-bottom: 2rem;
  }
  .portal-dates {
    font-family: 'Courier Prime', monospace; font-size: 0.78rem;
    color: var(--mid); display: flex; gap: 2rem; flex-wrap: wrap;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--burn); display: inline-block;
    margin-right: 0.4rem;
  }

  /* ── CONTENT ── */
  .portal-content {
    max-width: 860px; margin: 0 auto; padding: 0 2rem 4rem;
  }

  .section-divider {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 0.6rem; letter-spacing: 0.45em; text-transform: uppercase;
    color: var(--burn); margin: 3rem 0 1.5rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--ink); opacity: 0.15; }

  /* ── STORY ── */
  .story-block {
    padding: 2rem; border-left: 2px solid var(--burn);
    background: var(--card-bg); margin-bottom: 1rem;
  }
  .story-text {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 300;
    font-size: 1rem; line-height: 1.8; color: var(--ink);
  }
  .story-text p + p { margin-top: 1.2rem; }

  /* ── AUDIO ── */
  .audio-block {
    background: var(--card-bg); border: 1px solid var(--ink); padding: 1.5rem;
    position: relative; overflow: hidden;
  }
  .audio-label {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 400;
    font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--mid); margin-bottom: 0.75rem;
  }
  .audio-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem;
    color: var(--ink); margin-bottom: 1.25rem; line-height: 1;
    letter-spacing: 0.04em;
  }
  .player { display: flex; align-items: center; gap: 1rem; }
  .play-btn {
    width: 44px; height: 44px; flex-shrink: 0;
    background: var(--burn); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .play-btn:hover { background: #a82b06; }
  .play-btn svg { width: 16px; height: 16px; fill: var(--white); }
  .player-track { flex: 1; }
  .progress-bar {
    width: 100%; height: 3px; background: rgba(20,18,16,0.15);
    cursor: pointer; position: relative; margin-bottom: 0.5rem;
  }
  .progress-fill { height: 100%; background: var(--burn); width: 0%; transition: width 0.1s linear; pointer-events: none; }
  .player-times {
    display: flex; justify-content: space-between;
    font-family: 'Courier Prime', monospace; font-size: 0.72rem; color: var(--mid);
  }

  /* ── IMAGES ── */
  .image-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem;
  }
  .image-item {
    aspect-ratio: 4/3; overflow: hidden;
    border: 1px solid rgba(20,18,16,0.2);
    position: relative; cursor: zoom-in; background: var(--concrete);
  }
  .image-item img {
    width: 100%; height: 100%; object-fit: cover;
    filter: grayscale(15%) contrast(1.05);
    transition: transform 0.4s ease, filter 0.4s ease; display: block;
  }
  .image-item:hover img { transform: scale(1.04); filter: grayscale(0%) contrast(1.1); }
  .image-caption {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 0.5rem 0.75rem;
    background: linear-gradient(transparent, rgba(20,18,16,0.7));
    font-family: 'Courier Prime', monospace; font-size: 0.72rem;
    color: var(--white); opacity: 0; transition: opacity 0.3s;
  }
  .image-item:hover .image-caption { opacity: 1; }

  /* ── LIGHTBOX ── */
  .lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(20,18,16,0.92); z-index: 1000;
    align-items: center; justify-content: center; cursor: zoom-out;
  }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
  .lightbox-close {
    position: absolute; top: 1.5rem; right: 1.5rem;
    font-family: 'Bebas Neue', sans-serif; font-size: 2rem;
    color: var(--mid); cursor: pointer; background: none; border: none;
    transition: color 0.2s;
  }
  .lightbox-close:hover { color: var(--burn); }

  /* ── TICKER ── */
  .signal-strip {
    font-family: 'Courier Prime', monospace; font-size: 0.72rem; color: var(--mid);
    overflow: hidden; white-space: nowrap;
    border-top: 1px solid rgba(20,18,16,0.12); border-bottom: 1px solid rgba(20,18,16,0.12);
    padding: 0.45rem 0; margin: 2.5rem -2rem; background: var(--concrete);
  }
  .signal-strip span { display: inline-block; animation: scroll-left 35s linear infinite; }
  @keyframes scroll-left { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

  /* ── NOTIFY ── */
  .notify-block {
    background: var(--ink); padding: 2rem; margin-bottom: 2.5rem;
    position: relative; overflow: hidden;
  }
  .notify-block::after {
    content: 'SUBSCRIBE'; position: absolute; bottom: -1.5rem; right: 1rem;
    font-family: 'Bebas Neue', sans-serif; font-size: 7rem;
    color: var(--white); opacity: 0.04; line-height: 1; pointer-events: none;
  }
  .notify-block h2 {
    font-family: 'Bebas Neue', sans-serif; font-size: 2rem;
    margin-bottom: 0.4rem; color: var(--white); letter-spacing: 0.04em;
  }
  .notify-block p {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 300;
    font-size: 0.8rem; color: rgba(244,241,234,0.5);
    max-width: 480px; line-height: 1.6; margin-bottom: 1.25rem;
  }
  .notify-form { display: flex; max-width: 420px; }
  .notify-input {
    flex: 1; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.18); border-right: none;
    padding: 0.6rem 1rem; color: var(--white);
    font-family: 'Courier Prime', monospace; font-size: 0.8rem; outline: none;
  }
  .notify-input:focus { border-color: var(--burn); }
  .notify-input::placeholder { color: rgba(244,241,234,0.3); }
  .notify-btn {
    background: var(--burn); border: 1px solid var(--burn); color: var(--white);
    padding: 0.6rem 1.25rem; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 0.7rem; letter-spacing: 0.2em;
    text-transform: uppercase; cursor: pointer; transition: background 0.2s;
  }
  .notify-btn:hover { background: #a82b06; }

  /* ── CLOSING ── */
  .portal-closing {
    margin-top: 2.5rem; padding-top: 2rem;
    border-top: 1px solid rgba(20,18,16,0.15);
    display: flex; justify-content: space-between;
    align-items: flex-end; flex-wrap: wrap; gap: 1.5rem;
  }
  .closing-text {
    font-family: 'Courier Prime', monospace; font-size: 0.78rem;
    color: var(--mid); line-height: 1.6; max-width: 340px;
  }
  .closing-text strong { color: var(--burn); font-weight: normal; }
  .back-link {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--mid); text-decoration: none;
    border: 1px solid var(--mid); padding: 0.6rem 1.2rem;
    transition: border-color 0.2s, color 0.2s;
  }
  .back-link:hover { border-color: var(--burn); color: var(--burn); }

  /* ── STATES ── */
  .portal-loading {
    text-align: center; padding: 6rem 2rem;
    font-family: 'Courier Prime', monospace; font-size: 0.9rem;
    color: var(--mid); letter-spacing: 0.2em;
  }
  .blink { animation: blink 1.1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .portal-closed { text-align: center; padding: 6rem 2rem; }
  .closed-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 6rem);
    color: var(--mid); text-decoration: line-through;
    opacity: 0.5; margin-bottom: 1rem; letter-spacing: 0.04em;
  }
  .closed-msg {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 300;
    font-size: 0.85rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--mid);
  }
</style>
</head>
<body>

<nav>
  <a class="nav-back" href="index.html">← Back to Signal Noise</a>
  <div class="nav-band">KLAXON <span>HICKS</span></div>
</nav>

<div id="portal-root">
  <div class="portal-loading">Opening transmission <span class="blink">█</span></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  // ══════════════════════════════════════
  // PORTAL CONFIG
  // Duplicate this file, rename it portal-XX.html,
  // and update PORTAL_ID below to match your Sheet.
  // ══════════════════════════════════════
  const PORTAL_ID = 'portal-02';  // ← change this for each portal page
  const SHEET_ID  = '1C6tbG23rLBysLJypD_FCJW97dp-xfazID7yReJhLJBw';
  const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;

  function driveFileId(url) {
    if (!url) return null;
    const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
    return match ? match[1] : null;
  }
  function driveEmbed(url) {
    if (!url) return '';
    const id = driveFileId(url);
    if (id) return `https://drive.google.com/thumbnail?id=${id}&sz=s1200`;
    return url;
  }
  function driveAudio(url) {
    if (!url) return '';
    if (url.includes('drive.google.com')) {
      const id = driveFileId(url);
      if (id) return `https://drive.google.com/uc?export=open&id=${id}`;
    }
    return url;
  }

  function parseDate(str) {
    if (!str) return null;
    const parts = str.trim().split('/');
    if (parts.length === 3) return new Date(+parts[2], +parts[1]-1, +parts[0]);
    return new Date(str);
  }
  function formatDate(str) {
    const d = parseDate(str);
    if (!d) return '—';
    return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
  }
  function getStatus(openDate, closeDate) {
    const now = new Date(); now.setHours(0,0,0,0);
    const open  = parseDate(openDate);
    const close = parseDate(closeDate);
    if (!open)       return 'coming';
    if (now < open)  return 'coming';
    if (now > close) return 'closed';
    return 'open';
  }

  let audio = null;
  let isPlaying = false;

  function initPlayer(src, title) {
    audio = new Audio(src);
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('ended', () => { isPlaying = false; updatePlayBtn(); });
    document.getElementById('audio-title').textContent = title;
  }
  function togglePlay() {
    if (!audio) return;
    if (isPlaying) { audio.pause(); isPlaying = false; }
    else           { audio.play();  isPlaying = true;  }
    updatePlayBtn();
  }
  function updatePlayBtn() {
    const btn = document.getElementById('play-btn');
    if (!btn) return;
    btn.innerHTML = isPlaying
      ? `<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`
      : `<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>`;
  }
  function updateProgress() {
    if (!audio || !audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    const fill = document.getElementById('progress-fill');
    if (fill) fill.style.width = pct + '%';
    const cur = document.getElementById('time-current');
    const dur = document.getElementById('time-duration');
    if (cur) cur.textContent = fmtTime(audio.currentTime);
    if (dur) dur.textContent = fmtTime(audio.duration);
  }
  function seekTo(e) {
    if (!audio) return;
    const pct = e.offsetX / e.currentTarget.offsetWidth;
    audio.currentTime = pct * audio.duration;
  }
  function fmtTime(s) {
    if (isNaN(s)) return '0:00';
    return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  }

  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('active');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lightbox-img').src = '';
  }

  function renderPortal(portal) {
    const status = getStatus(portal.open_date, portal.close_date);
    const root   = document.getElementById('portal-root');
    document.title = `Signal Noise — ${portal.title || 'Portal'}`;

    if (status === 'closed') {
      root.innerHTML = `
        <div class="portal-closed">
          <div class="closed-title">${portal.title || 'Portal'}</div>
          <div class="closed-msg">This portal has closed. No archive. No replay.</div>
          <br><br><a class="back-link" href="index.html">← Return to Signal Noise</a>
        </div>`;
      return;
    }
    if (status === 'coming') {
      root.innerHTML = `
        <div class="portal-closed">
          <div class="closed-title" style="text-decoration:none;opacity:0.6">${portal.title || '??????????'}</div>
          <div class="closed-msg">This portal is not yet open. Check back soon.</div>
          <br><br><a class="back-link" href="index.html">← Return to Signal Noise</a>
        </div>`;
      return;
    }

    const imageUrls = (portal.image_urls || '').split(',').map(u => u.trim()).filter(Boolean).map(driveEmbed);
    const audioSrc  = driveAudio(portal.audio_url || '');

    let audioHTML = '';
    if (audioSrc) {
      audioHTML = `
        <div class="section-divider">Listen</div>
        <div class="audio-block">
          <div class="audio-label">// Transmission</div>
          <div class="audio-title" id="audio-title">Loading...</div>
          <div class="player">
            <button class="play-btn" id="play-btn" onclick="togglePlay()">
              <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
            <div class="player-track">
              <div class="progress-bar" onclick="seekTo(event)">
                <div class="progress-fill" id="progress-fill"></div>
              </div>
              <div class="player-times">
                <span id="time-current">0:00</span>
                <span id="time-duration">0:00</span>
              </div>
            </div>
          </div>
        </div>`;
    }

    let imagesHTML = '';
    if (imageUrls.length > 0) {
      imagesHTML = `
        <div class="section-divider">Images &amp; documents</div>
        <div class="image-grid">
          ${imageUrls.map((src, i) => `
            <div class="image-item" onclick="openLightbox('${src}')">
              <img src="${src}" alt="Portal image ${i+1}" loading="lazy">
              <div class="image-caption">// image ${String(i+1).padStart(2,'0')}</div>
            </div>`).join('')}
        </div>`;
    }

    root.innerHTML = `
      <div class="portal-hero">
        <div class="portal-meta">Signal Noise — ${portal.portal_id || 'Portal'}</div>
        <div class="portal-title">${portal.title || '??????????'}</div>
        <div class="portal-dates">
          <span><span class="live-dot"></span>Portal open</span>
          <span>Closes: ${formatDate(portal.close_date)}</span>
        </div>
      </div>

      <div class="portal-content">
        ${portal.description ? `
          <div class="section-divider">The story</div>
          <div class="story-block">
            <div class="story-text">
              ${portal.description.split('\\n').map(p => `<p>${p}</p>`).join('')}
            </div>
          </div>` : ''}

        ${audioHTML}
        ${imagesHTML}

        <div class="signal-strip">
          <span>&nbsp;&nbsp;&nbsp;&nbsp;No archive // No replay // Only now &nbsp;&nbsp;&nbsp;&nbsp;///&nbsp;&nbsp;&nbsp;&nbsp; Klaxon Hicks // Signal Noise // Perth WA &nbsp;&nbsp;&nbsp;&nbsp;///&nbsp;&nbsp;&nbsp;&nbsp; No archive // No replay // Only now &nbsp;&nbsp;&nbsp;&nbsp;</span>
        </div>

        <div class="notify-block">
          <h2>Don't miss the next portal</h2>
          <p>Portals open and close. No archive, no replay. Drop your email before it's gone.</p>
          <div class="notify-form" id="notify-form">
            <input class="notify-input" type="email" id="notify-email" placeholder="your@email.com">
            <button class="notify-btn" id="notify-btn" onclick="submitEmail()">Signal me</button>
          </div>
          <div id="notify-msg" style="display:none; font-family:'Courier Prime',monospace; font-size:0.85rem; margin-top:0.75rem;"></div>
        </div>

        <div class="portal-closing">
          <div class="closing-text">
            This portal closes on <strong>${formatDate(portal.close_date)}</strong>.<br>
            After that — it's gone. No archive. No replay.
          </div>
          <a class="back-link" href="index.html">← All portals</a>
        </div>
      </div>`;

    if (audioSrc) initPlayer(audioSrc, portal.title || 'Untitled');
  }

  async function loadPortal() {
    try {
      const res  = await fetch(SHEET_URL);
      const text = await res.text();
      const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
      const cols = json.table.cols.map(c => c.label.toLowerCase().replace(/\s+/g,'_'));
      const portals = json.table.rows
        .filter(r => r.c && r.c[0] && r.c[0].v)
        .map(r => {
          const obj = {};
          cols.forEach((col, i) => {
            obj[col] = r.c[i] ? (r.c[i].f || r.c[i].v || '') : '';
            if (obj[col] && typeof obj[col] === 'string' && obj[col].startsWith('Date(')) {
              const p = obj[col].replace('Date(','').replace(')','').split(',');
              const d = new Date(+p[0], +p[1], +p[2]);
              obj[col] = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
            }
          });
          return obj;
        });
      const portal = portals.find(p => p.portal_id === PORTAL_ID);
      if (!portal) {
        document.getElementById('portal-root').innerHTML =
          `<div class="portal-loading">Portal not found <span class="blink">█</span></div>`;
        return;
      }
      renderPortal(portal);
    } catch(err) {
      console.error('Signal Noise portal error:', err);
      document.getElementById('portal-root').innerHTML =
        `<div class="portal-loading">Signal lost <span class="blink">█</span></div>`;
    }
  }

  loadPortal();

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwo9PrXu9ThToXojFajGfzmjtaaGTF6zOtdSJSAKHIE0M1wC4Ojwq8G52AZRQGWDw/exec';

  async function submitEmail() {
    const input = document.getElementById('notify-email');
    const btn   = document.getElementById('notify-btn');
    const email = input ? input.value.trim() : '';
    if (!email || !email.includes('@')) { showMsg('Enter a valid email address', 'var(--burn)'); return; }
    btn.textContent = 'Sending...';
    btn.disabled = true;
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      document.getElementById('notify-form').style.display = 'none';
      showMsg("// Signal received — we'll be in touch", 'var(--white)');
    } catch(err) {
      btn.textContent = 'Signal me';
      btn.disabled = false;
      showMsg('Transmission failed — try again', 'var(--burn)');
    }
  }

  function showMsg(text, color) {
    const msg = document.getElementById('notify-msg');
    if (!msg) return;
    msg.textContent = text; msg.style.color = color; msg.style.display = 'block';
  }
</script>

</body>
</html>
